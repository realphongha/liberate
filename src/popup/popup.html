<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Liberate</h1>
    <div class="status-row">
      <span class="label">Status</span>
      <label class="switch">
        <input type="checkbox" id="toggle">
        <span class="slider"></span>
      </label>
      <span id="statusText" class="status-text">Enabled</span>
    </div>
    <div class="module-list" id="moduleList">
      <div class="module-item" data-module="translate">
        <span class="label">Translate Unlock</span>
        <label class="switch small">
          <input type="checkbox">
          <span class="slider"></span>
        </label>
      </div>
      <div class="module-item" data-module="rightClick">
        <span class="label">Right Click Unlock</span>
        <label class="switch small">
          <input type="checkbox">
          <span class="slider"></span>
        </label>
      </div>
      <div class="module-item" data-module="selection">
        <span class="label">Selection Unlock</span>
        <label class="switch small">
          <input type="checkbox">
          <span class="slider"></span>
        </label>
      </div>
      <div class="module-item" data-module="copy">
        <span class="label">Copy Unlock</span>
        <label class="switch small">
          <input type="checkbox">
          <span class="slider"></span>
        </label>
      </div>
      <div class="module-item" data-module="drag">
        <span class="label">Drag Unlock</span>
        <label class="switch small">
          <input type="checkbox">
          <span class="slider"></span>
        </label>
      </div>
      <div class="module-item" data-module="keyboard">
        <span class="label">Keyboard Unlock</span>
        <label class="switch small">
          <input type="checkbox">
          <span class="slider"></span>
        </label>
      </div>
    </div>
    <div class="domain-row">
      <span class="label">Current site</span>
      <span id="domain" class="domain"></span>
    </div>
    <button id="siteAction" class="btn">Disable for this site</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
